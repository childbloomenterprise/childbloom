    <!-- Structured Data: FAQPage — common parenting search queries -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ChildBloom and how does Dr. Bloom work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChildBloom is an AI-powered child development companion featuring Dr. Bloom — an AI advisor available 24/7 that gives personalised, evidence-based guidance based on your child's age and profile. It uses WHO growth standards, tracks vaccination schedules, and supports parents from pregnancy through age 7. ChildBloom is free to start and works on any device without downloading an app."
          }
        },
        {
          "@type": "Question",
          "name": "How do I track my baby's growth according to WHO charts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In ChildBloom, you enter your baby's weight, length, and head circumference after each pediatric visit. The app automatically plots these measurements on WHO growth charts, shows which percentile your baby is on, calculates growth velocity (weight gain per week), and alerts you if the growth curve drops significantly. WHO recommends these growth standards for all children under 5."
          }
        },
        {
          "@type": "Question",
          "name": "How does ChildBloom handle vaccination schedules?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChildBloom generates a personalised vaccination schedule based on your child's date of birth. It tracks which vaccines are upcoming or overdue and sends reminders before each one is due. Dr. Bloom follows WHO and regional pediatric guidelines (AAP, IAP, NHS, etc.) and can answer your questions about any specific vaccine."
          }
        },
        {
          "@type": "Question",
          "name": "Can an AI replace a pediatrician for baby advice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No — Dr. Bloom on ChildBloom is designed to complement, not replace, your pediatrician. It provides instant, evidence-based guidance between visits, helps parents ask better questions at appointments, and explains medical advice in plain language in their preferred language. For emergencies, serious illness, or when you are uncertain, ChildBloom always recommends consulting your doctor in person."
          }
        },
        {
          "@type": "Question",
          "name": "What are the key developmental milestones for babies aged 0–12 months?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Key milestones include: 2 months (social smile, head lift during tummy time), 4 months (head control, rolls front-to-back, laughs), 6 months (sits with support, babbles), 9 months (sits independently, waves bye-bye, crawls), 12 months (pulls to stand, first steps, 1–3 real words, points). ChildBloom tracks all four milestone domains — motor, language, social, and cognitive — and alerts parents if development needs evaluation."
          }
        }
      ]
    }
    </script>
