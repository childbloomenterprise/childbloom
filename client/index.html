    <!-- Structured Data: FAQPage — top Indian parenting search queries -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Which is the best AI pediatrician app in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChildBloom is India's leading AI pediatrician app, featuring Dr. Bloom — an AI advisor available 24/7 in 6 Indian languages (English, Hindi, Tamil, Telugu, Malayalam, Punjabi). It follows IAP vaccination guidelines, uses WHO growth charts, and covers complementary feeding with traditional Indian foods like dal, ragi, and khichdi. ChildBloom is free to start and works on any device without downloading an app."
          }
        },
        {
          "@type": "Question",
          "name": "How do I track my baby's growth according to WHO charts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In ChildBloom, you enter your baby's weight, length, and head circumference after each pediatric visit. The app automatically plots these measurements on WHO growth charts, shows which percentile your baby is on, calculates growth velocity (weight gain per week), and alerts you if the growth curve drops significantly. IAP recommends WHO growth standards for all Indian children under 5."
          }
        },
        {
          "@type": "Question",
          "name": "What is the IAP vaccination schedule for babies in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The IAP (Indian Academy of Pediatrics) vaccination schedule begins at birth with BCG and Hepatitis B, continues at 6, 10, and 14 weeks with DTaP, IPV, Hib, PCV, and Rotavirus vaccines, then includes MMR and typhoid at 9 months, Hepatitis A and Varicella at 12 months, and boosters through age 6. ChildBloom generates a personalized IAP schedule based on your child's date of birth and sends reminders before each vaccine is due."
          }
        },
        {
          "@type": "Question",
          "name": "Can an AI replace a pediatrician for baby advice in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No — an AI like Dr. Bloom on ChildBloom is designed to complement, not replace, your pediatrician. It provides instant, evidence-based guidance between visits, helps Indian parents ask better questions at appointments, and explains medical advice in plain language in their preferred language. For emergencies, serious illness, or when you are uncertain, ChildBloom always recommends consulting your doctor in person."
          }
        },
        {
          "@type": "Question",
          "name": "What are the key developmental milestones for babies aged 0–12 months?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Key milestones include: 2 months (social smile, head lift during tummy time), 4 months (head control, rolls front-to-back, laughs), 6 months (sits with support, babbles), 9 months (sits independently, waves bye-bye, crawls), 12 months (pulls to stand, first steps, 1–3 real words, points). ChildBloom tracks all four milestone domains — motor, language, social, and cognitive — and alerts parents if development needs evaluation."
          }
        }
      ]
    }
    </script>
