<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1D9E75" />
  <title>You're offline — ChildBloom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F7F4EF;
      color: #2A1C15;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: rgba(61,43,35,0.60);
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto 32px;
    }

    .btn {
      display: inline-block;
      background: #1D9E75;
      color: white;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 28px;
      border-radius: 12px;
      text-decoration: none;
      margin-bottom: 12px;
    }

    .note {
      font-size: 12px;
      color: rgba(61,43,35,0.40);
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <img class="icon" src="/logo192.png" alt="ChildBloom" />
  <h1>You're offline</h1>
  <p>
    Your development guides are still available and your weekly check-ins
    will sync automatically when you reconnect.
  </p>
  <a class="btn" href="/guides">Read development guides</a>
  <p class="note">Your data is safe and waiting for you.</p>
</body>
</html>
